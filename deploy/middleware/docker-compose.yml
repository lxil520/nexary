services:
  redis:
    image: redis:7.4-alpine
    container_name: nexary-redis
    ports:
      - "${REDIS_PORT:-16379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  valkey:
    image: valkey/valkey:8-alpine
    container_name: nexary-valkey
    ports:
      - "${VALKEY_PORT:-16380}:6379"
    command: ["valkey-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.7.1
    container_name: nexary-kafka
    ports:
      - "${KAFKA_PORT:-19092}:19092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:19092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_PORT:-19092}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/9092'"]
      interval: 10s
      timeout: 5s
      retries: 20

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.1
    container_name: nexary-rocketmq-namesrv
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-19876}:9876"
    command: ["sh", "mqnamesrv"]
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/9876'"]
      interval: 10s
      timeout: 5s
      retries: 20

  rocketmq-broker:
    image: apache/rocketmq:5.3.1
    container_name: nexary-rocketmq-broker
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    ports:
      - "${ROCKETMQ_BROKER_PORT:-10911}:10911"
    volumes:
      - ./rocketmq/conf/broker.conf:/home/rocketmq/rocketmq-5.3.1/conf/broker.conf:ro
    command: ["sh", "mqbroker", "-c", "/home/rocketmq/rocketmq-5.3.1/conf/broker.conf"]
    healthcheck:
      test: ["CMD-SHELL", "sh mqadmin clusterList -n rocketmq-namesrv:9876 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  mysql:
    image: mysql:8.4
    container_name: nexary-mysql
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-local-demo-root}"
      MYSQL_DATABASE: "xxl_job"
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    volumes:
      - ./mysql/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p${MYSQL_ROOT_PASSWORD:-local-demo-root} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.1
    platform: linux/amd64
    container_name: nexary-xxl-job-admin
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      JAVA_OPTS: "-XX:TieredStopAtLevel=1"
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=root
        --spring.datasource.password=${MYSQL_ROOT_PASSWORD:-local-demo-root}
        --xxl.job.accessToken=${XXL_JOB_ACCESS_TOKEN:-local-demo-token}
    ports:
      - "${XXL_JOB_ADMIN_PORT:-18080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      timeout: 5s
      retries: 20

  powerjob-mysql:
    image: powerjob/powerjob-mysql:latest
    container_name: nexary-powerjob-mysql
    environment:
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: "${POWERJOB_MYSQL_ROOT_PASSWORD:-No1Bug2Please3!}"
    ports:
      - "${POWERJOB_MYSQL_PORT:-13307}:3306"
    volumes:
      - ./powerjob/mysql:/var/lib/mysql
    command: ["--lower_case_table_names=1"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p${POWERJOB_MYSQL_ROOT_PASSWORD:-local-demo-powerjob-root} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30

  powerjob-server:
    image: powerjob/powerjob-server:latest
    container_name: nexary-powerjob-server
    depends_on:
      powerjob-mysql:
        condition: service_healthy
    environment:
      JVMOPTIONS: "-Xmx512m"
      PARAMS: >-
        --oms.mongodb.enable=false
        --spring.datasource.core.jdbc-url=jdbc:mysql://powerjob-mysql:3306/powerjob-daily?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
        --spring.datasource.core.username=root
        --spring.datasource.core.password=${POWERJOB_MYSQL_ROOT_PASSWORD:-No1Bug2Please3!}
    ports:
      - "${POWERJOB_SERVER_HTTP_PORT:-17700}:7700"
      - "${POWERJOB_SERVER_AKKA_PORT:-10086}:10086"
      - "${POWERJOB_SERVER_REMOTE_PORT:-10010}:10010"
      - "${POWERJOB_SERVER_EXTRA_PORT:-10077}:10077"
    volumes:
      - ./powerjob/server:/root/powerjob/server
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/7700'"]
      interval: 10s
      timeout: 5s
      retries: 30

  powerjob-worker-samples:
    image: powerjob/powerjob-worker-samples:latest
    container_name: nexary-powerjob-worker-samples
    depends_on:
      powerjob-server:
        condition: service_healthy
    environment:
      PARAMS: "--powerjob.worker.server-address=powerjob-server:7700"
    ports:
      - "${POWERJOB_WORKER_HTTP_PORT:-18081}:8081"
      - "${POWERJOB_WORKER_PORT:-27777}:27777"
    volumes:
      - ./powerjob/worker-samples:/root/powerjob/worker

  activemq-classic:
    image: apache/activemq-classic:6.1.7
    container_name: nexary-activemq-classic
    ports:
      - "${ACTIVEMQ_CLASSIC_PORT:-61616}:61616"
      - "${ACTIVEMQ_CLASSIC_WEB_PORT:-18161}:8161"
    healthcheck:
      test: ["CMD-SHELL", "bash -ec '</dev/tcp/127.0.0.1/61616'"]
      interval: 10s
      timeout: 5s
      retries: 20
