name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 0.5.1 or v0.5.1'
        required: true
      publish_to_central:
        description: 'Upload and publish the bundle to Maven Central'
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  central-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
      - name: Validate release input
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          PUBLISH_TO_CENTRAL: ${{ github.event_name == 'push' || inputs.publish_to_central }}
          GITHUB_REF_TYPE: ${{ github.ref_type }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_REF_NAME#v}"
          if ! [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must look like 0.5.1 or v0.5.1. Received: ${RELEASE_REF_NAME}"
            exit 1
          fi

          if [ "${PUBLISH_TO_CENTRAL}" = "true" ] && [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Central publish must run from an existing Git tag. Use workflow_dispatch with publish_to_central=false for bundle-only checks."
            exit 1
          fi

          REF_VERSION="${GITHUB_REF_NAME#v}"
          if [ "${PUBLISH_TO_CENTRAL}" = "true" ] && [ "${VERSION}" != "${REF_VERSION}" ]; then
            echo "Central publish version ${VERSION} must match the selected tag ${GITHUB_REF_NAME}."
            exit 1
          fi
      - name: Build Maven Central Portal bundle
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          ORG_GRADLE_PROJECT_nexaryVersion: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          ORG_GRADLE_PROJECT_nexarySigningKey: ${{ secrets.NEXARY_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_nexarySigningPassword: ${{ secrets.NEXARY_SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_projectWebsite: ${{ vars.NEXARY_PROJECT_WEBSITE }}
          ORG_GRADLE_PROJECT_projectScmUrl: ${{ vars.NEXARY_PROJECT_SCM_URL }}
          ORG_GRADLE_PROJECT_projectScmConnection: ${{ vars.NEXARY_PROJECT_SCM_CONNECTION }}
          ORG_GRADLE_PROJECT_projectScmDeveloperConnection: ${{ vars.NEXARY_PROJECT_SCM_DEVELOPER_CONNECTION }}
        run: |
          set -euo pipefail

          VERSION="${RELEASE_REF_NAME#v}"
          ./gradlew mavenCentralBundle -PnexaryVersion="${VERSION}"
      - uses: actions/upload-artifact@v4
        with:
          name: maven-central-bundle
          path: build/distributions/*.zip
      - name: Publish Maven Central deployment
        env:
          RELEASE_REF_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
          PUBLISH_TO_CENTRAL: ${{ github.event_name == 'push' || inputs.publish_to_central }}
          CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          set -euo pipefail

          if [ "${PUBLISH_TO_CENTRAL}" != "true" ]; then
            echo "Maven Central publish skipped by workflow input."
            exit 0
          fi

          if [ -z "${CENTRAL_USERNAME}" ] || [ -z "${CENTRAL_PASSWORD}" ]; then
            echo "Maven Central publish requires MAVEN_CENTRAL_USERNAME and MAVEN_CENTRAL_PASSWORD."
            exit 1
          fi

          echo "::add-mask::${CENTRAL_USERNAME}"
          echo "::add-mask::${CENTRAL_PASSWORD}"

          VERSION="${RELEASE_REF_NAME#v}"
          BUNDLE="$(find build/distributions -maxdepth 1 -name "nexary-${VERSION}-central-bundle.zip" -print -quit)"
          if [ -z "${BUNDLE}" ]; then
            echo "Central bundle not found for version ${VERSION}."
            exit 1
          fi

          AUTH_TOKEN="$(printf '%s:%s' "${CENTRAL_USERNAME}" "${CENTRAL_PASSWORD}" | base64 | tr -d '\n')"
          echo "::add-mask::${AUTH_TOKEN}"
          CURL_OPTS=(--connect-timeout 10 --max-time 60 --retry 2 --retry-delay 2)
          CENTRAL_BOM_URL="https://repo.maven.apache.org/maven2/com/aweimao/nexary-bom/${VERSION}/nexary-bom-${VERSION}.pom"

          central_version_exists() {
            curl "${CURL_OPTS[@]}" --head --fail --silent --show-error "${CENTRAL_BOM_URL}" > /dev/null
          }

          if central_version_exists; then
            echo "Maven Central already has nexary-bom ${VERSION}; publish step is complete."
            exit 0
          fi

          DEPLOYMENT_ID="$(curl "${CURL_OPTS[@]}" --fail-with-body -sS \
            --request POST \
            --header "Authorization: Bearer ${AUTH_TOKEN}" \
            --form "bundle=@${BUNDLE}" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=nexary-${VERSION}&publishingType=USER_MANAGED")"

          echo "Central deployment id: ${DEPLOYMENT_ID}"

          for attempt in $(seq 1 90); do
            curl "${CURL_OPTS[@]}" --fail-with-body -sS \
              --request POST \
              --header "Authorization: Bearer ${AUTH_TOKEN}" \
              "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}" \
              > central-status.json
            STATE="$(python3 -c 'import json; print(json.load(open("central-status.json"))["deploymentState"])')"
            echo "Central validation state: ${STATE}"

            if [ "${STATE}" = "VALIDATED" ]; then
              HTTP_STATUS="$(curl "${CURL_OPTS[@]}" -sS \
                --request POST \
                --header "Authorization: Bearer ${AUTH_TOKEN}" \
                --output central-publish-response.txt \
                --write-out '%{http_code}' \
                "https://central.sonatype.com/api/v1/publisher/deployment/${DEPLOYMENT_ID}")"
              if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
                cat central-publish-response.txt
              elif central_version_exists; then
                echo "Maven Central already has nexary-bom ${VERSION}; treating this duplicate publish as complete."
                cat central-publish-response.txt
                exit 0
              else
                echo "Central publish request failed with HTTP ${HTTP_STATUS}."
                cat central-publish-response.txt
                exit 1
              fi
              break
            fi

            if [ "${STATE}" = "PUBLISHED" ]; then
              exit 0
            fi

            if [ "${STATE}" = "FAILED" ]; then
              if grep -q "already exists" central-status.json && central_version_exists; then
                echo "Maven Central already has nexary-bom ${VERSION}; treating this duplicate validation failure as complete."
                cat central-status.json
                exit 0
              fi
              cat central-status.json
              exit 1
            fi

            if [ "${attempt}" = "90" ]; then
              echo "Timed out waiting for Central validation."
              cat central-status.json
              exit 1
            fi

            sleep 10
          done

          for attempt in $(seq 1 90); do
            curl "${CURL_OPTS[@]}" --fail-with-body -sS \
              --request POST \
              --header "Authorization: Bearer ${AUTH_TOKEN}" \
              "https://central.sonatype.com/api/v1/publisher/status?id=${DEPLOYMENT_ID}" \
              > central-status.json
            STATE="$(python3 -c 'import json; print(json.load(open("central-status.json"))["deploymentState"])')"
            echo "Central publish state: ${STATE}"

            if [ "${STATE}" = "PUBLISHED" ]; then
              cat central-status.json
              exit 0
            fi

            if central_version_exists; then
              echo "Maven Central has nexary-bom ${VERSION}; treating the publish wait as complete."
              cat central-status.json
              exit 0
            fi

            if [ "${STATE}" = "FAILED" ]; then
              cat central-status.json
              exit 1
            fi

            if [ "${attempt}" = "90" ]; then
              echo "Timed out waiting for Central publish."
              cat central-status.json
              exit 1
            fi

            sleep 10
          done
