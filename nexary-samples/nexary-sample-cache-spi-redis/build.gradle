plugins {
    id 'application'
}

dependencies {
    // SPI/provider-dependency adoption path:
    // - currently verified for Spring Boot 3.3.x + Java 17+.
    // - published coordinates map to artifactIds: nexary-cache-api + nexary-cache-redis.
    // - Redis and Valkey share the Redis-protocol provider path; configuration selects provider=redis or provider=valkey.
    // - Boot2 and Boot4 have version-line provider artifacts documented in the sample README.
    // - business code compiles against the Nexary cache API only, including counter abstractions.
    // - the concrete Redis-protocol provider is introduced as a provider dependency.
    // - switching to another provider should change this dependency and nexary.cache.* config,
    //   not controller/service source code.
    implementation project(':nexary-cache:nexary-cache-api')
    runtimeOnly project(':nexary-cache:nexary-cache-redis')

    implementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

application {
    mainClass = 'org.nexary.samples.cache.app.CacheSampleApplication'
}
