nexary:
  messaging:
    # In-process provider. No broker is required.
    provider: disruptor
    disruptor:
      enabled: true
      capacity: 1024
      # Nexary retry policy. The handler code does not receive broker retry objects.
      retry-max-attempts: 3
      retry-initial-delay: 1s
      retry-backoff-strategy: fixed
      retry-max-backoff: 30s
