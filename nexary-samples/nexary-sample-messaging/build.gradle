plugins {
    id 'application'
}

dependencies {
    // Main adoption path:
    // - current verified line is Spring Boot 3.3 + Java 17+
    // - published artifactId today: org.nexary:nexary-messaging-spring-boot-starter
    // - pre-release naming recommendation: org.nexary:nexary-messaging-spring-boot3-starter
    // - the starter aggregates Messaging API + provider auto-configuration
    // - choose the active provider with nexary.messaging.provider in application*.yml
    // - keep facade/controller/consumer code on org.nexary.messaging APIs only
    implementation project(':nexary-boot:nexary-messaging-spring-boot-starter')
    // Redis profile needs Spring Boot's Redis connection factory.
    // Kafka/RocketMQ/Disruptor provider code is not imported by sample business code.
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

application {
    mainClass = 'org.nexary.samples.messaging.app.MessagingSampleApplication'
}
