plugins {
    id 'application'
}

dependencies {
    // SPI/provider dependency adoption path:
    // - after publication, import com.aweimao:nexary-bom:${nexaryVersion}.
    // - compile business code against com.aweimao:nexary-messaging-api only.
    // - add exactly one provider at runtime: com.aweimao:nexary-messaging-rocketmq.
    // - switching to Kafka/Redis/Disruptor means changing the provider module,
    //   not changing facade/controller/consumer code.
    implementation project(':nexary-messaging:nexary-messaging-api')
    runtimeOnly project(':nexary-messaging:nexary-messaging-rocketmq')

    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

application {
    mainClass = 'org.nexary.samples.messaging.spi.rocketmq.app.MessagingSampleApplication'
}
