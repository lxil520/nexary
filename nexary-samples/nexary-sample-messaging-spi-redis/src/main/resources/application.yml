spring:
  application:
    name: nexary-sample-messaging-spi-redis
  data:
    redis:
      # Local Redis from ./scripts/middleware/up.sh.
      host: 127.0.0.1
      port: 16379

server:
  port: 8093

nexary:
  messaging:
    # SPI/provider dependency mode:
    # this module depends on nexary-messaging-api + nexary-messaging-redis only.
    # Business code does not change when you create another SPI module for another provider.
    provider: redis
    redis:
      enabled: true
      # Topic maps to a Redis ready list key under this prefix.
      queue-prefix: "nexary:sample:spi:redis:mq:"
      # Redis queue moves ready messages into a processing list before calling the handler.
      processing-prefix: "nexary:sample:spi:redis:mq:processing:"
      # A processing lease lets stale recovery detect messages that were moved but not acked.
      processing-lease-prefix: "nexary:sample:spi:redis:mq:processing:lease:"
      # When this lease expires, the subscription worker may recover the message back to ready.
      # This is not an exactly-once or transaction guarantee.
      visibility-timeout: 30s
      # How often the Redis subscription worker scans its processing list for stale messages.
      processing-recovery-interval: 5s
      # Duplicate-consumption protection is backed by Redis set-if-absent keys.
      deduplication-prefix: "nexary:sample:spi:redis:mq:dedup:"
      deduplication-ttl: 1h
      # Failed handlers are retried by Nexary and terminal failures become MessageDeadLetterRecord.
      retry-max-attempts: 3
      retry-initial-delay: 1s
      retry-backoff-strategy: fixed
      retry-max-backoff: 30s
