plugins {
    id 'application'
}

dependencies {
    implementation project(':nexary-boot:nexary-console-spring-boot-starter')
    implementation project(':nexary-boot:nexary-governance-spring-boot-starter')
    implementation project(':nexary-boot:nexary-observation-micrometer-spring-boot-starter')
    implementation 'io.micrometer:micrometer-core'
    implementation 'org.springframework.boot:spring-boot-starter'
    implementation 'org.springframework.boot:spring-boot-starter-web'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

application {
    mainClass = 'org.nexary.samples.governance.app.GovernanceSampleApplication'
}
