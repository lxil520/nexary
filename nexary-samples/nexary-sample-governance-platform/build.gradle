plugins {
    id 'org.springframework.boot' version "${springBootVersion}"
    id 'io.spring.dependency-management' version '1.1.6'
}

dependencies {
    implementation project(':nexary-boot:nexary-governance-spring-boot-starter')
    implementation project(':nexary-boot:nexary-console-spring-boot-starter')
    implementation project(':nexary-governance:nexary-governance-platform-server')
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-data-redis'
    implementation 'com.rabbitmq:amqp-client:5.21.0'
    runtimeOnly 'org.postgresql:postgresql:42.5.1'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}
