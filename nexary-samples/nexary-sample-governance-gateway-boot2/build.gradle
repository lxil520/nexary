plugins {
    id 'application'
}

dependencies {
    implementation platform("org.springframework.boot:spring-boot-dependencies:${rootProject.ext.springBoot2Version}")
    testImplementation platform("org.springframework.boot:spring-boot-dependencies:${rootProject.ext.springBoot2Version}")
    implementation project(':nexary-boot:nexary-governance-gateway-spring-boot2-starter')
    implementation "org.springframework.boot:spring-boot-starter-webflux:${rootProject.ext.springBoot2Version}"
    implementation 'org.springframework.cloud:spring-cloud-starter-gateway:3.1.9'
    testImplementation "org.springframework.boot:spring-boot-starter-test:${rootProject.ext.springBoot2Version}"
}

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

application {
    mainClass = 'org.nexary.samples.governance.gateway.boot2.app.GovernanceGatewayBoot2SampleApplication'
}
