plugins {
    id 'application'
}

dependencies {
    // SPI/provider dependency adoption path:
    // - currently verified for Spring Boot 3.3.x + Java 17+.
    // - published artifactIds after release:
    //   implementation org.nexary:nexary-job-api
    //   runtimeOnly    org.nexary:nexary-job-scheduler
    // - Boot2 target artifacts, pending verification and not released:
    //   org.nexary:nexary-job-api-java8
    //   org.nexary:nexary-job-scheduler-spring5
    // - business code uses only org.nexary.job.* abstractions.
    // - this module introduces exactly one provider: the local scheduler.
    // - switching to the XXL-JOB bridge means using nexary-sample-job-spi-xxljob
    //   or changing the provider dependency/configuration, not changing business code.
    // - durable execution records are optional; add
    //   org.nexary:nexary-job-execution-store-redis plus Redis connectivity
    //   when needed. Boot2 target name is
    //   org.nexary:nexary-job-execution-store-redis-spring5.
    implementation project(':nexary-job:nexary-job-api')
    runtimeOnly project(':nexary-job:nexary-job-scheduler')

    implementation 'org.springframework.boot:spring-boot-starter'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
}

application {
    mainClass = 'org.nexary.samples.job.spi.scheduler.JobSpiSchedulerSampleApplication'
}
