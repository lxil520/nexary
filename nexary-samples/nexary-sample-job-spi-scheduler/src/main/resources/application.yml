spring:
  application:
    name: nexary-sample-job-spi-scheduler

nexary:
  job:
    # SPI/provider mode:
    # This module does not depend on nexary-job-spring-boot-starter.
    # It depends on nexary-job-api and adds exactly one provider artifact:
    # nexary-job-scheduler. The provider is selected here.
    provider: local
    execution:
      store:
        redis:
          # SPI mode needs an explicit provider dependency for Redis durable
          # records: nexary-job-execution-store-redis plus Redis connectivity.
          # Keep false for this minimal provider sample.
          enabled: false
          key-prefix: "nexary:job:execution:"
          retention: 1d
    scheduler:
      # Local provider execution lifecycle. Nexary framework loads these values;
      # the sample business job still only implements NexaryJob.
      execution-timeout: 5m
      retry-attempts: 0
      retry-backoff: 0s
      concurrency-policy: allow
      misfire-policy: fire_once
      misfire-threshold: 1m
      lock-lease-time: 5m
