allprojects {
    group = 'com.aweimao'
    version = findProperty('nexaryVersion') ?: '0.18.0'
}

configure(subprojects.findAll { it.name != 'nexary-bom' && it.buildFile.exists() }) {
    apply plugin: 'java-library'
    apply plugin: 'maven-publish'
    apply plugin: 'signing'

    java {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        withSourcesJar()
        withJavadocJar()
    }

    dependencies {
        if (![
                'nexary-core',
                'nexary-cache-api',
                'nexary-cache-redis-spring-boot2',
                'nexary-cache-redis-spring-boot4',
                'nexary-cache-spring-boot2-starter',
                'nexary-cache-spring-boot4-starter',
                'nexary-messaging-api',
                'nexary-messaging-redis-spring-boot2',
                'nexary-messaging-spring-boot2-starter',
                'nexary-messaging-disruptor-spring-boot4',
                'nexary-messaging-kafka-spring-boot4',
                'nexary-messaging-redis-spring-boot4',
                'nexary-messaging-rocketmq-spring-boot4',
                'nexary-messaging-spring-boot4-starter',
                'nexary-job-api',
                'nexary-job-scheduler-spring-boot2',
                'nexary-job-scheduler-spring-boot4',
                'nexary-job-xxljob-spring-boot2',
                'nexary-job-xxljob-spring-boot4',
                'nexary-job-powerjob-spring-boot2',
                'nexary-job-powerjob-spring-boot4',
                'nexary-job-execution-store-redis-spring-boot2',
                'nexary-job-execution-store-redis-spring-boot4',
                'nexary-job-spring-boot2-starter',
                'nexary-job-spring-boot4-starter',
                'nexary-governance-gateway-spring-boot2-starter',
                'nexary-sample-governance-gateway-boot2'
        ].contains(project.name)) {
            implementation platform("org.springframework.boot:spring-boot-dependencies:${rootProject.ext.springBootVersion}")
            annotationProcessor platform("org.springframework.boot:spring-boot-dependencies:${rootProject.ext.springBootVersion}")
        }
        testImplementation platform("org.junit:junit-bom:${rootProject.ext.junitVersion}")
        testImplementation 'org.junit.jupiter:junit-jupiter'
        testImplementation 'org.assertj:assertj-core:3.26.3'
        testImplementation 'org.mockito:mockito-core:5.12.0'
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.compilerArgs += ['-parameters', '-Xlint:deprecation']
    }

    tasks.withType(Javadoc).configureEach {
        options.encoding = 'UTF-8'
        options.addStringOption('Xdoclint:none', '-quiet')
    }

    test {
        useJUnitPlatform()
        [
                'NEXARY_RUN_INFRA_TESTS',
                'NEXARY_INFRA_REDIS_HOST',
                'NEXARY_INFRA_REDIS_PORT',
                'NEXARY_INFRA_KAFKA_BOOTSTRAP',
                'NEXARY_INFRA_ROCKETMQ_NAMESRV'
        ].each { key ->
            def value = System.getProperty(key) ?: System.getenv(key)
            if (value != null) {
                systemProperty key, value
            }
        }
    }

    publishing {
        repositories {
            maven {
                name = 'releaseStaging'
                url = rootProject.layout.buildDirectory.dir('release-staging').get().asFile.toURI()
            }
        }
        publications {
            mavenJava(MavenPublication) {
                from components.java
                pom {
                    name = project.name
                    description = "Nexary ${project.name} module"
                    url = rootProject.ext.projectWebsite
                    licenses {
                        license {
                            name = 'The Apache License, Version 2.0'
                            url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }
                    developers {
                        developer {
                            id = 'nexary'
                            name = 'Nexary contributors'
                        }
                    }
                    scm {
                        connection = rootProject.ext.projectScmConnection
                        developerConnection = rootProject.ext.projectScmDeveloperConnection
                        url = rootProject.ext.projectWebsite
                    }
                }
            }
        }
    }

    signing {
        required {
            rootProject.ext.centralReleaseModulePaths.contains(project.path) &&
                    !project.version.toString().endsWith('-SNAPSHOT') &&
                    (rootProject.findProperty('nexarySigningKey') || System.getenv('ORG_GRADLE_PROJECT_nexarySigningKey'))
        }
        def inMemoryKey = rootProject.findProperty('nexarySigningKey') ?: System.getenv('ORG_GRADLE_PROJECT_nexarySigningKey')
        def inMemoryPassword = rootProject.findProperty('nexarySigningPassword') ?: System.getenv('ORG_GRADLE_PROJECT_nexarySigningPassword')
        if (inMemoryKey) {
            useInMemoryPgpKeys(inMemoryKey.toString(), inMemoryPassword?.toString())
        }
        sign publishing.publications
    }
}

