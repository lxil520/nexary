            ':nexary-boot:nexary-messaging-spring-boot4-starter',
            ':nexary-boot:nexary-job-spring-boot-starter',
            ':nexary-boot:nexary-job-spring-boot2-starter',
            ':nexary-boot:nexary-job-spring-boot4-starter',
            ':nexary-boot:nexary-governance-spring-boot-starter',
